name: Generate Daily Panchanga

on:
  schedule:
    # 05:00 IST = 22:30 UTC (previous day)
    - cron: "30 14 * * *"
    - cron: "30 16 * * *"
    - cron: "30 18 * * *"
    - cron: "30 20 * * *"
    - cron: "30 23 * * *"
    - cron: "30 5 * * *"
    - cron: "30 7 * * *"
    - cron: "30 9 * * *"
    - cron: "30 12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install panchang

      - name: Generate Panchanga
        run: |
          python scripts/generate_panchanga.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/data/panchanga/current.json

          git diff --cached --quiet || \
          git commit -m "chore: update daily panchanga"

          git push
